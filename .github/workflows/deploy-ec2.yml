name: Deploy To EC2

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
  EC2_HOST: ${{ vars.EC2_HOST }}
  EC2_USERNAME: ${{ vars.EC2_USERNAME }}
  EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/marketing-planning-generator' }}
  HOST_PORT: ${{ vars.HOST_PORT || '80' }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate Python sources
        run: |
          python -m py_compile \
            server.py \
            pdf_generator.py \
            main.py \
            agents/planner.py \
            agents/researcher.py \
            agents/executor.py \
            config/llm_config.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: marketing-muse-main/marketing-muse-main/package-lock.json

      - name: Install frontend dependencies
        working-directory: marketing-muse-main/marketing-muse-main
        run: npm ci

      - name: Lint frontend
        working-directory: marketing-muse-main/marketing-muse-main
        run: npm run lint

      - name: Build frontend
        working-directory: marketing-muse-main/marketing-muse-main
        run: npm run build

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify deployment files exist
        run: |
          test -f deploy/compose.ec2.yaml
          test -f scripts/deploy-ec2.sh

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}:${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}:latest

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "deploy/compose.ec2.yaml,scripts/deploy-ec2.sh"
          target: /tmp/marketing-planning-generator
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          DOCKERHUB_REPOSITORY: ${{ env.DOCKERHUB_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_DIR: ${{ env.EC2_APP_DIR }}
          HOST_PORT: ${{ env.HOST_PORT }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_REPOSITORY,IMAGE_TAG,DOCKERHUB_TOKEN,GROQ_API_KEY,APP_DIR,HOST_PORT
          script: |
            set -e
            mkdir -p "$APP_DIR"
            cp /tmp/marketing-planning-generator/compose.ec2.yaml "$APP_DIR/compose.ec2.yaml"
            cp /tmp/marketing-planning-generator/deploy-ec2.sh "$APP_DIR/deploy-ec2.sh"
            chmod +x "$APP_DIR/deploy-ec2.sh"
            "$APP_DIR/deploy-ec2.sh"