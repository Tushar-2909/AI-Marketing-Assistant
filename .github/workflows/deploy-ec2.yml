name: Deploy To EC2

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_HOST: ${{ vars.EC2_HOST }}
  EC2_USERNAME: ${{ vars.EC2_USERNAME }}
  EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/marketing-planning-generator' }}
  HOST_PORT: ${{ vars.HOST_PORT || '80' }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate Python sources
        run: python -m py_compile server.py pdf_generator.py main.py agents/planner.py agents/researcher.py agents/executor.py config/llm_config.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: marketing-muse-main/marketing-muse-main/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: marketing-muse-main/marketing-muse-main

      - name: Lint frontend
        run: npm run lint
        working-directory: marketing-muse-main/marketing-muse-main

      - name: Build frontend
        run: npm run build
        working-directory: marketing-muse-main/marketing-muse-main

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "deploy/compose.ec2.yaml,scripts/deploy-ec2.sh"
          target: /tmp/marketing-planning-generator
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_DIR: ${{ env.EC2_APP_DIR }}
          HOST_PORT: ${{ env.HOST_PORT }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,GROQ_API_KEY,APP_DIR,HOST_PORT
          script: |
            set -e
            mkdir -p "$APP_DIR"
            cp /tmp/marketing-planning-generator/compose.ec2.yaml "$APP_DIR/compose.ec2.yaml"
            cp /tmp/marketing-planning-generator/deploy-ec2.sh "$APP_DIR/deploy-ec2.sh"
            chmod +x "$APP_DIR/deploy-ec2.sh"
            "$APP_DIR/deploy-ec2.sh"
